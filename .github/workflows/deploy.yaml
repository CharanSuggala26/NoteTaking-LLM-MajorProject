name: CI/CD to AKS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE_NAME: mern-backend
      FRONTEND_IMAGE_NAME: mern-frontend
      ACR_NAME: mernacr123

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Login to Azure
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Build and push backend Docker image with a unique tag
      - name: Build and push backend image
        run: |
          IMAGE_TAG=$(date +%Y%m%d%H%M%S)
          echo "BACKEND_IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          docker build -t $ACR_NAME.azurecr.io/$BACKEND_IMAGE_NAME:$IMAGE_TAG ./server
          docker push $ACR_NAME.azurecr.io/$BACKEND_IMAGE_NAME:$IMAGE_TAG

      # Build and push frontend Docker image with a unique tag
      - name: Build and push frontend image
        run: |
          IMAGE_TAG=$(date +%Y%m%d%H%M%S)
          echo "FRONTEND_IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          docker build -t $ACR_NAME.azurecr.io/$FRONTEND_IMAGE_NAME:$IMAGE_TAG ./client
          docker push $ACR_NAME.azurecr.io/$FRONTEND_IMAGE_NAME:$IMAGE_TAG

      # Set up kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.28.0'

      # Get AKS credentials
      - name: Get AKS credentials
        run: |
          az aks get-credentials --resource-group mern-aks-rg --name mern-aks-cluster

      # Deploy backend with the new image tag
      - name: Deploy backend to AKS
        run: |
          kubectl set image deployment/mern-backend mern-backend=$ACR_NAME.azurecr.io/$BACKEND_IMAGE_NAME:$BACKEND_IMAGE_TAG
          kubectl rollout status deployment/mern-backend

      # Deploy frontend with the new image tag
      - name: Deploy frontend to AKS
        run: |
          kubectl set image deployment/mern-frontend mern-frontend=$ACR_NAME.azurecr.io/$FRONTEND_IMAGE_NAME:$FRONTEND_IMAGE_TAG
          kubectl rollout status deployment/mern-frontend

      # Apply ingress
      - name: Apply ingress
        run: |
          kubectl apply -f ./k8s/ingress.yaml